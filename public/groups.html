<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المجموعات | اكــتوشــوت واتساب</title>

    <!-- Fonts - Modern -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/sidebar.css">
    <link rel="stylesheet" href="/css/animations.css">
    <link rel="stylesheet" href="/css/premium.css">
    <link rel="stylesheet" href="/css/icons.css">
    <style>
        .groups-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.25rem;
        }

        .group-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.25rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .group-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .group-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
            border-color: var(--primary);
        }

        .group-card:hover::before {
            opacity: 1;
        }

        .group-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
            margin-bottom: 1rem;
            box-shadow: 0 4px 15px rgba(var(--primary-rgb), 0.3);
        }

        .group-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 0.5rem;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .group-id-container {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--bg-secondary);
            padding: 0.6rem 0.8rem;
            border-radius: 0.5rem;
            margin-top: 0.75rem;
            border: 1px solid var(--border);
        }

        .group-id {
            flex: 1;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            color: var(--text-muted);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            direction: ltr;
            text-align: left;
        }

        .copy-btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 0.4rem;
            padding: 0.4rem 0.7rem;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            white-space: nowrap;
        }

        .copy-btn:hover {
            background: var(--primary-hover);
            transform: scale(1.05);
        }

        .copy-btn.copied {
            background: var(--success);
        }

        .search-container {
            margin-bottom: 1.5rem;
        }

        .search-input {
            width: 100%;
            max-width: 400px;
            padding: 0.9rem 1.2rem;
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            color: var(--text-color);
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(var(--primary-rgb), 0.2);
        }

        .groups-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .groups-count {
            background: var(--bg-secondary);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-size: 0.9rem;
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .loading-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }

        .loading-state .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }

        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>
    <!-- Aurora Background -->

    <div class="layout-wrapper">
        <!-- Sidebar -->

                <div class="nav-section">
                    <div class="nav-section-title">واتساب</div>
                    <a href="/profiles" class="nav-item">
                        <span class="nav-icon"><svg viewBox="0 0 24 24">
                                <rect width="14" height="20" x="5" y="2" rx="2" ry="2" />
                                <path d="M12 18h.01" />
                            </svg></span>
                        <span class="nav-text">الأجهزة</span>
                    </a>
                    <a href="/chats" class="nav-item">
                        <span class="nav-icon"><svg viewBox="0 0 24 24">
                                <path d="m3 21 1.9-5.7a8.5 8.5 0 1 1 3.8 3.8z" />
                            </svg></span>
                        <span class="nav-text">المحادثات</span>
                    </a>
                    <a href="/groups" class="nav-item active">
                        <span class="nav-icon"><svg viewBox="0 0 24 24">
                                <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                                <circle cx="9" cy="7" r="4" />
                                <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
                                <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                            </svg></span>
                        <span class="nav-text">المجموعات</span>
                    </a>
                    <a href="/campaigns" class="nav-item">
                        <span class="nav-icon"><svg viewBox="0 0 24 24">
                                <path d="m3 11 18-5v12L3 13v-2z" />
                                <path d="M11.6 16.8a3 3 0 1 1-5.8-1.6" />

                        <span class="nav-text">الحملات</span>
                    </a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">الأدوات</div>
                    <a href="/contacts" class="nav-item">
                        <span class="nav-icon"><svg viewBox="0 0 24 24">

                                <circle cx="9" cy="7" r="4" />
                                <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
                                <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                            </svg></span>
                        <span class="nav-text">جهات الاتصال</span>
                    </a>
                    <a href="/spintax" class="nav-item">
                        <span class="nav-icon"><svg viewBox="0 0 24 24">
                                <path
                                    d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z" />
                            </svg></span>
                        <span class="nav-text">مولد الرسائل</span>
                    </a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">للمطورين</div>
                    <a href="/api-docs" class="nav-item">
                        <span class="nav-icon"><svg viewBox="0 0 24 24">
                                <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20" />
                                <path d="m9 9.5 2 2-2 2" />
                                <path d="M13 13.5h3" />
                            </svg></span>
                        <span class="nav-text">دليل API</span>
                    </a>
                    <a href="/api-logs" class="nav-item">
                        <span class="nav-icon"><svg viewBox="0 0 24 24">
                                <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" />
                                <polyline points="14 2 14 8 20 8" />
                                <line x1="16" x2="8" y1="13" y2="13" />
                                <line x1="16" x2="8" y1="17" y2="17" />
                            </svg></span>

                    </a>
                </div>
            </nav>

            <div class="sidebar-footer">
                <button id="themeToggle" class="theme-toggle">
                    <svg class="theme-icon" viewBox="0 0 24 24">
                        <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
                    </svg>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="content-wrapper">
                <!-- Page Header -->
                <div class="page-header">
                    <div class="header-top">
                        <h1 class="page-title">
                            <span class="title-icon">👥</span>
                            المجموعات
                        </h1>
                    </div>
                    <p class="page-description">جميع المجموعات التي يشارك فيها الحساب - انسخ الـ ID لاستخدامه في الـ API
                    </p>
                </div>

                <!-- Search & Count -->
                <div class="groups-header">
                    <div class="search-container">
                        <input type="text" id="searchInput" class="search-input" placeholder="🔍 ابحث بالاسم أو ID..."
                            oninput="filterGroups(this.value)">
                    </div>
                    <div class="groups-count" id="groupsCount">
                        جاري التحميل...
                    </div>
                </div>

                <!-- Groups Grid -->
                <div id="groupsGrid" class="groups-grid">
                    <div class="loading-state">
                        <div class="spinner"></div>
                        <p>جاري تحميل المجموعات...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <script>
        // Theme Toggle
        const themeToggle = document.getElementById('themeToggle');
        let isDarkTheme = localStorage.getItem('theme') === 'dark';

        if (isDarkTheme) {
            document.body.classList.add('dark-theme');
            themeToggle.innerHTML = '<svg class="theme-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/></svg>';
        }

        themeToggle.addEventListener('click', () => {
            isDarkTheme = !isDarkTheme;
            document.body.classList.toggle('dark-theme');
            themeToggle.innerHTML = isDarkTheme
                ? '<svg class="theme-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/></svg>'
                : '<svg class="theme-icon" viewBox="0 0 24 24"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>';
            localStorage.setItem('theme', isDarkTheme ? 'dark' : 'light');
        });

        let allGroups = [];

        // Load groups on page load
        document.addEventListener('DOMContentLoaded', loadGroups);

        async function loadGroups() {
            const grid = document.getElementById('groupsGrid');
            const countEl = document.getElementById('groupsCount');

            try {
                const response = await fetch('/api/contacts/groups');
                const data = await response.json();

                if (data.success && data.groups && data.groups.length > 0) {
                    allGroups = data.groups;
                    countEl.textContent = `${data.groups.length} مجموعة`;
                    renderGroups(data.groups);
                } else {
                    countEl.textContent = '0 مجموعات';
                    grid.innerHTML = `
                        <div class="empty-state" style="grid-column: 1 / -1;">
                            <div class="icon">📭</div>
                            <h3>لا توجد مجموعات</h3>
                            <p>تأكد من اتصال واتساب وأنك عضو في مجموعات</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error loading groups:', error);
                countEl.textContent = 'خطأ';
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <div class="icon">❌</div>
                        <h3>خطأ في التحميل</h3>
                        <p>تأكد من أن السيرفر يعمل وأن واتساب متصل</p>
                    </div>
                `;
            }
        }

        function renderGroups(groups) {
            const grid = document.getElementById('groupsGrid');

            if (groups.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <div class="icon">🔍</div>
                        <h3>لا توجد نتائج</h3>
                        <p>جرب كلمات بحث مختلفة</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = groups.map(group => {
                const groupId = group.id._serialized || group.id;
                const initials = getInitials(group.name);

                return `
                    <div class="group-card">
                        <div class="group-avatar">${initials}</div>
                        <div class="group-name" title="${escapeHtml(group.name)}">${escapeHtml(group.name)}</div>
                        <div class="group-id-container">
                            <span class="group-id" id="id-${groupId}">${groupId}</span>
                            <button class="copy-btn" onclick="copyId('${groupId}', this)">
                                📋 نسخ
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterGroups(query) {
            const lowerQuery = query.toLowerCase().trim();
            const countEl = document.getElementById('groupsCount');

            if (!lowerQuery) {
                countEl.textContent = `${allGroups.length} مجموعة`;
                renderGroups(allGroups);
                return;
            }

            const filtered = allGroups.filter(g => {
                const name = g.name.toLowerCase();
                const id = (g.id._serialized || g.id).toLowerCase();
                return name.includes(lowerQuery) || id.includes(lowerQuery);
            });

            countEl.textContent = `${filtered.length} من ${allGroups.length} مجموعة`;
            renderGroups(filtered);
        }

        function copyId(id, btn) {
            navigator.clipboard.writeText(id).then(() => {
                const originalText = btn.innerHTML;
                btn.innerHTML = '✅ تم النسخ!';
                btn.classList.add('copied');

                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.classList.remove('copied');
                }, 2000);

                showToast('تم نسخ ID المجموعة', 'success');
            }).catch(err => {
                showToast('فشل في النسخ', 'error');
            });
        }

        function getInitials(name) {
            if (!name) return '👥';
            const words = name.trim().split(' ');
            if (words.length >= 2) {
                return words[0].charAt(0) + words[1].charAt(0);
            }
            return name.substring(0, 2);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `
                <span class="toast-icon">${type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️'}</span>
                <span class="toast-message">${message}</span>
            `;
            container.appendChild(toast);

            setTimeout(() => {
                toast.classList.add('toast-hide');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
    </script>
</body>

</html>
