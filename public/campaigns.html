<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حملات الرسائل - OctoSHOT WhatsApp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/campaigns.css">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">🐙</span>
                    <span class="logo-text">اكــتوشــوت</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="/profiles" class="nav-item">
                    <span class="nav-icon">📱</span>
                    <span class="nav-text">الأجهزة</span>
                </a>
                <a href="/api-docs" class="nav-item">
                    <span class="nav-icon">📚</span>
                    <span class="nav-text">دليل API للمطورين</span>
                </a>
                <a href="/api-logs" class="nav-item">
                    <span class="nav-icon">📋</span>
                    <span class="nav-text">سجل الرسائل</span>
                </a>
                <a href="/dashboard" class="nav-item">
                    <span class="nav-icon">📊</span>
                    <span class="nav-text">لوحة التحكم</span>
                </a>
                <a href="/chats" class="nav-item">
                    <span class="nav-icon">💬</span>
                    <span class="nav-text">المحادثات</span>
                </a>
                <a href="/spintax" class="nav-item">
                    <span class="nav-icon">✨</span>
                    <span class="nav-text">مولد الرسائل الذكي</span>
                </a>
                <a href="/campaigns" class="nav-item active">
                    <span class="nav-icon">📣</span>
                    <span class="nav-text">الحملات</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="theme-row">
                    <span>الوضع</span>
                    <button class="theme-btn" id="themeToggle" title="تبديل الوضع">
                        <span class="theme-icon">🌙</span>
                    </button>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="campaigns-container">
                <!-- Header -->
                <div class="page-header">
                    <div class="page-title">
                        <span style="font-size: 32px;">📣</span>
                        <h1>حملات الرسائل</h1>
                    </div>
                    <div style="display: flex; gap: 12px;">
                        <a href="/campaigns/templates/recipients.csv" download class="btn btn-secondary">
                            ⬇️ تحميل قالب CSV
                        </a>
                        <a href="/campaign-create" class="btn btn-primary">
                            ➕ حملة جديدة
                        </a>
                    </div>
                </div>

                <!-- Stats -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon" style="background: rgba(0, 217, 255, 0.2);">📊</div>
                        <div class="stat-value" id="totalCampaigns">0</div>
                        <div class="stat-label">إجمالي الحملات</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background: rgba(0, 255, 136, 0.2);">▶️</div>
                        <div class="stat-value" id="runningCampaigns">0</div>
                        <div class="stat-label">حملات نشطة</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background: rgba(102, 126, 234, 0.2);">✅</div>
                        <div class="stat-value" id="completedCampaigns">0</div>
                        <div class="stat-label">مكتملة</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background: rgba(255, 179, 0, 0.2);">📤</div>
                        <div class="stat-value" id="totalSent">0</div>
                        <div class="stat-label">رسائل مرسلة</div>
                    </div>
                </div>

                <!-- Campaigns Table -->
                <div class="campaigns-card">
                    <div class="card-header">
                        <h2>📋 قائمة الحملات</h2>
                        <div class="filter-group">
                            <select id="profileFilter" class="filter-select">
                                <option value="">كل الأجهزة</option>
                            </select>
                            <select id="statusFilter" class="filter-select">
                                <option value="">كل الحالات</option>
                                <option value="draft">مسودة</option>
                                <option value="running">نشط</option>
                                <option value="paused">متوقف</option>
                                <option value="completed">مكتمل</option>
                            </select>
                            <div class="search-box">
                                <span>🔍</span>
                                <input type="text" id="searchInput" placeholder="بحث...">
                            </div>
                        </div>
                    </div>

                    <div id="campaignsContainer">
                        <div class="loading">
                            <div class="spinner"></div>
                        </div>
                    </div>
                </div>
            </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const socket = io();
        let campaigns = [];
        let profiles = [];
        let currentDeviceId = null;

        // Load profiles for filter
        async function loadProfiles() {
            try {
                const response = await fetch('/api/profiles');
                const data = await response.json();
                if (data.success && data.data) {
                    profiles = data.data;
                    const profileFilter = document.getElementById('profileFilter');
                    profiles.forEach(p => {
                        const option = document.createElement('option');
                        option.value = p.id;
                        option.textContent = p.name || `جهاز ${p.id}`;
                        profileFilter.appendChild(option);
                    });
                } else {
                    profiles = [];
                }
            } catch (error) {
                console.error('Error loading profiles:', error);
                profiles = [];
            }
        }

        // Load campaigns
        async function loadCampaigns() {
            const deviceId = document.getElementById('profileFilter').value;
            const status = document.getElementById('statusFilter').value;
            const search = document.getElementById('searchInput').value.toLowerCase();

            if (!deviceId && profiles && profiles.length > 0) {
                // Load all campaigns from all devices
                let allCampaigns = [];
                for (const profile of profiles) {
                    try {
                        let url = `/api/campaigns?device_id=${profile.id}`;
                        if (status) url += `&status=${status}`;
                        const response = await fetch(url);
                        const data = await response.json();
                        if (data.success && data.campaigns) {
                            allCampaigns = [...allCampaigns, ...data.campaigns.map(c => ({
                                ...c,
                                profile_name: profile.name || `جهاز ${profile.id}`
                            }))];
                        }
                    } catch (error) {
                        console.error('Error loading campaigns for device:', profile.id, error);
                    }
                }
                campaigns = allCampaigns;
            } else if (deviceId) {
                try {
                    let url = `/api/campaigns?device_id=${deviceId}`;
                    if (status) url += `&status=${status}`;
                    const response = await fetch(url);
                    const data = await response.json();
                    if (data.success && data.campaigns) {
                        const profile = profiles.find(p => p.id == deviceId);
                        campaigns = data.campaigns.map(c => ({
                            ...c,
                            profile_name: profile?.name || `جهاز ${deviceId}`
                        }));
                    } else {
                        campaigns = [];
                    }
                } catch (error) {
                    console.error('Error loading campaigns:', error);
                    campaigns = [];
                }
            } else {
                // No profiles loaded, try to show empty state
                campaigns = [];
                renderCampaigns();
                updateStats();
                return;
            }

            // Apply search filter
            if (search) {
                campaigns = campaigns.filter(c =>
                    c.name.toLowerCase().includes(search) ||
                    c.profile_name?.toLowerCase().includes(search)
                );
            }

            renderCampaigns();
            updateStats();
        }

        function renderCampaigns() {
            const container = document.getElementById('campaignsContainer');

            if (campaigns.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📣</div>
                        <h3>لا توجد حملات</h3>
                        <p>ابدأ بإنشاء حملة جديدة لإرسال رسائل جماعية</p>
                        <a href="/campaign-create" class="btn btn-primary">➕ إنشاء حملة</a>
                    </div>
                `;
                return;
            }

            const tableHTML = `
                <table class="campaigns-table">
                    <thead>
                        <tr>
                            <th>الحملة</th>
                            <th>الجهاز</th>
                            <th>النوع</th>
                            <th>الحالة</th>
                            <th>التقدم</th>
                            <th>التاريخ</th>
                            <th>الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${campaigns.map(c => `
                            <tr data-id="${c.id}">
                                <td>
                                    <a href="/campaign-detail?id=${c.id}" class="campaign-name">${escapeHtml(c.name)}</a>
                                </td>
                                <td>
                                    <div class="campaign-device">
                                        <div class="device-avatar">📱</div>
                                        <span>${escapeHtml(c.profile_name || 'غير محدد')}</span>
                                    </div>
                                </td>
                                <td>${c.type === 'single' ? 'رسالة واحدة' : 'متسلسل'}</td>
                                <td>
                                    <span class="status-badge status-${c.status}">
                                        ${getStatusIcon(c.status)} ${getStatusText(c.status)}
                                    </span>
                                </td>
                                <td class="progress-cell">
                                    ${renderProgress(c)}
                                </td>
                                <td>${formatDate(c.created_at)}</td>
                                <td>
                                    <div class="action-btns">
                                        ${renderActionButtons(c)}
                                    </div>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            container.innerHTML = tableHTML;

            // Attach event listeners
            container.querySelectorAll('.btn-icon').forEach(btn => {
                btn.addEventListener('click', handleAction);
            });
        }

        function renderProgress(campaign) {
            const total = campaign.total_recipients || 0;
            const sent = campaign.sent_count || 0;
            const percent = total > 0 ? Math.round((sent / total) * 100) : 0;

            return `
                <div class="progress-bar">
                    <div class="progress-fill" style="width: ${percent}%"></div>
                </div>
                <div class="progress-text">${sent} / ${total} (${percent}%)</div>
            `;
        }

        function renderActionButtons(campaign) {
            let buttons = '';

            if (campaign.status === 'draft' || campaign.status === 'paused') {
                buttons += `<button class="btn-icon play" data-action="start" data-id="${campaign.id}" title="تشغيل">▶️</button>`;
            }
            if (campaign.status === 'running') {
                buttons += `<button class="btn-icon pause" data-action="pause" data-id="${campaign.id}" title="إيقاف مؤقت">⏸️</button>`;
            }

            buttons += `<button class="btn-icon" data-action="view" data-id="${campaign.id}" title="عرض التفاصيل">👁️</button>`;

            if (campaign.status === 'draft') {
                buttons += `<button class="btn-icon delete" data-action="delete" data-id="${campaign.id}" title="حذف">🗑️</button>`;
            }

            return buttons;
        }

        async function handleAction(e) {
            const action = e.currentTarget.dataset.action;
            const id = e.currentTarget.dataset.id;

            switch (action) {
                case 'start':
                    await startCampaign(id);
                    break;
                case 'pause':
                    await pauseCampaign(id);
                    break;
                case 'view':
                    window.location.href = `/campaign-detail?id=${id}`;
                    break;
                case 'delete':
                    if (confirm('هل أنت متأكد من حذف هذه الحملة؟')) {
                        await deleteCampaign(id);
                    }
                    break;
            }
        }

        async function startCampaign(id) {
            try {
                const response = await fetch(`/api/campaigns/${id}/start`, { method: 'POST' });
                const data = await response.json();
                if (data.success) {
                    showToast('تم تشغيل الحملة بنجاح', 'success');
                    loadCampaigns();
                } else {
                    showToast(data.error || 'فشل تشغيل الحملة', 'error');
                }
            } catch (error) {
                showToast('خطأ في الاتصال', 'error');
            }
        }

        async function pauseCampaign(id) {
            try {
                const response = await fetch(`/api/campaigns/${id}/pause`, { method: 'POST' });
                const data = await response.json();
                if (data.success) {
                    showToast('تم إيقاف الحملة مؤقتاً', 'warning');
                    loadCampaigns();
                } else {
                    showToast(data.error || 'فشل إيقاف الحملة', 'error');
                }
            } catch (error) {
                showToast('خطأ في الاتصال', 'error');
            }
        }

        async function deleteCampaign(id) {
            try {
                const response = await fetch(`/api/campaigns/${id}`, { method: 'DELETE' });
                const data = await response.json();
                if (data.success) {
                    showToast('تم حذف الحملة', 'success');
                    loadCampaigns();
                } else {
                    showToast(data.error || 'فشل حذف الحملة', 'error');
                }
            } catch (error) {
                showToast('خطأ في الاتصال', 'error');
            }
        }

        function updateStats() {
            document.getElementById('totalCampaigns').textContent = campaigns.length;
            document.getElementById('runningCampaigns').textContent = campaigns.filter(c => c.status === 'running').length;
            document.getElementById('completedCampaigns').textContent = campaigns.filter(c => c.status === 'completed').length;
            document.getElementById('totalSent').textContent = campaigns.reduce((sum, c) => sum + (c.sent_count || 0), 0);
        }

        function getStatusIcon(status) {
            const icons = {
                draft: '📝',
                scheduled: '📅',
                running: '▶️',
                paused: '⏸️',
                completed: '✅',
                cancelled: '❌',
                failed: '⚠️'
            };
            return icons[status] || '❓';
        }

        function getStatusText(status) {
            const texts = {
                draft: 'مسودة',
                scheduled: 'مجدول',
                running: 'نشط',
                paused: 'متوقف',
                completed: 'مكتمل',
                cancelled: 'ملغى',
                failed: 'فشل'
            };
            return texts[status] || status;
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            return new Date(dateStr).toLocaleDateString('ar-EG', {
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                bottom: 24px;
                left: 24px;
                padding: 16px 24px;
                background: ${type === 'success' ? '#00ff88' : type === 'error' ? '#ff4757' : '#ffb300'};
                color: #000;
                border-radius: 8px;
                font-weight: 600;
                z-index: 1000;
                animation: slideIn 0.3s ease;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Socket.IO for real-time updates
        socket.on('campaign:progress', (data) => {
            const campaign = campaigns.find(c => c.id === data.campaignId);
            if (campaign) {
                campaign.sent_count = data.sent || campaign.sent_count;
                campaign.status = data.status || campaign.status;
                renderCampaigns();
                updateStats();
            }
        });

        socket.on('campaign:status', (data) => {
            const campaign = campaigns.find(c => c.id === data.campaignId);
            if (campaign) {
                campaign.status = data.status;
                renderCampaigns();
                updateStats();
            }
        });

        // Event listeners
        document.getElementById('profileFilter').addEventListener('change', loadCampaigns);
        document.getElementById('statusFilter').addEventListener('change', loadCampaigns);
        document.getElementById('searchInput').addEventListener('input', debounce(loadCampaigns, 300));

        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        }

        // Initialize
        loadProfiles().then(() => loadCampaigns());
    </script>
</body>

</html>
