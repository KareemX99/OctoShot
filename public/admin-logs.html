<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Logs - OctoSHOT WhatsApp</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f0f23;
            --bg-secondary: #1a1a2e;
            --bg-card: #16213e;
            --accent-primary: #00d9ff;
            --accent-success: #00ff88;
            --accent-warning: #ffaa00;
            --accent-error: #ff4757;
            --accent-critical: #ff0066;
            --text-primary: #ffffff;
            --text-secondary: #8892b0;
            --border-color: #2d3748;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* Login Screen */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
        }

        .login-card {
            background: var(--bg-card);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border-color);
        }

        .login-card h1 {
            text-align: center;
            margin-bottom: 10px;
            color: var(--accent-primary);
        }

        .login-card p {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 16px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(0, 217, 255, 0.2);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-primary), #0088ff);
            color: var(--bg-primary);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 217, 255, 0.3);
        }

        .error-message {
            background: rgba(255, 71, 87, 0.1);
            border: 1px solid var(--accent-error);
            color: var(--accent-error);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        /* Dashboard */
        .dashboard {
            display: none;
        }

        .header {
            background: var(--bg-secondary);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .header h1 {
            font-size: 24px;
            color: var(--accent-primary);
        }

        .header-actions {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 20px;
            background: var(--bg-card);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent-error);
            animation: pulse 2s infinite;
        }

        .status-dot.connected {
            background: var(--accent-success);
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .btn-logout {
            padding: 8px 16px;
            background: transparent;
            border: 1px solid var(--accent-error);
            color: var(--accent-error);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-logout:hover {
            background: var(--accent-error);
            color: white;
        }

        /* Stats Bar */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            padding: 20px 24px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
        }

        .stat-card {
            background: var(--bg-card);
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .stat-card .count {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .stat-card .label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .stat-card.sent .count {
            color: var(--accent-success);
        }

        .stat-card.failed .count {
            color: var(--accent-error);
        }

        .stat-card.warning .count {
            color: var(--accent-warning);
        }

        .stat-card.block .count {
            color: var(--accent-critical);
        }

        /* Filters */
        .filters-bar {
            display: flex;
            gap: 16px;
            padding: 16px 24px;
            background: var(--bg-secondary);
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-group label {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .filter-group select {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-card);
            color: var(--text-primary);
            cursor: pointer;
        }

        .filter-group select:focus {
            outline: none;
            border-color: var(--accent-primary);
        }

        .btn-clear {
            padding: 8px 16px;
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            border-radius: 6px;
            cursor: pointer;
            margin-left: auto;
        }

        .btn-clear:hover {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        /* Logs Container */
        .logs-container {
            padding: 24px;
            max-height: calc(100vh - 280px);
            overflow-y: auto;
        }

        .log-entry {
            display: grid;
            grid-template-columns: 80px 220px 100px 100px 1fr;
            gap: 12px;
            padding: 14px 16px;
            background: var(--bg-card);
            border-radius: 8px;
            margin-bottom: 8px;
            border-left: 4px solid var(--border-color);
            transition: all 0.3s;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .log-entry:hover {
            background: var(--bg-secondary);
        }

        .log-entry.debug {
            border-left-color: var(--text-secondary);
        }

        .log-entry.info {
            border-left-color: var(--accent-primary);
        }

        .log-entry.warning {
            border-left-color: var(--accent-warning);
        }

        .log-entry.error {
            border-left-color: var(--accent-error);
        }

        .log-entry.critical {
            border-left-color: var(--accent-critical);
            background: rgba(255, 0, 102, 0.1);
        }

        .log-time {
            color: var(--text-secondary);
            font-size: 13px;
            font-family: 'Consolas', monospace;
        }

        .log-type {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 4px;
            background: var(--bg-secondary);
            text-align: center;
            text-transform: uppercase;
            font-weight: 600;
        }

        .log-type.connection {
            color: var(--accent-primary);
            background: rgba(0, 217, 255, 0.15);
        }

        .log-type.message_sent {
            color: var(--accent-success);
            background: rgba(0, 255, 136, 0.15);
        }

        .log-type.message_failed {
            color: var(--accent-error);
            background: rgba(255, 71, 87, 0.15);
        }

        .log-type.block_detected {
            color: var(--accent-critical);
            background: rgba(255, 0, 102, 0.2);
        }

        .log-type.warning {
            color: var(--accent-warning);
            background: rgba(255, 170, 0, 0.15);
        }

        .log-type.typing_simulation {
            color: #9b59b6;
            background: rgba(155, 89, 182, 0.15);
        }

        .log-type.rate_limit {
            color: #3498db;
            background: rgba(52, 152, 219, 0.15);
        }

        /* New log type colors */
        .log-type.webhook_sent {
            color: #1abc9c;
            background: rgba(26, 188, 156, 0.15);
        }

        .log-type.webhook_incoming {
            color: #9b59b6;
            background: rgba(155, 89, 182, 0.15);
        }

        .log-type.message_received {
            color: #3498db;
            background: rgba(52, 152, 219, 0.15);
        }

        .log-type.message_delivered {
            color: #2ecc71;
            background: rgba(46, 204, 113, 0.15);
        }

        .log-type.message_read {
            color: #27ae60;
            background: rgba(39, 174, 96, 0.15);
        }

        .log-type.auto_reply {
            color: #e67e22;
            background: rgba(230, 126, 34, 0.15);
        }

        .log-type.customer_replied {
            color: #f1c40f;
            background: rgba(241, 196, 15, 0.15);
        }

        .log-type.batch_created {
            color: #8e44ad;
            background: rgba(142, 68, 173, 0.15);
        }

        .log-type.batch_completed {
            color: #27ae60;
            background: rgba(39, 174, 96, 0.15);
        }

        .log-type.session_restore {
            color: #00bcd4;
            background: rgba(0, 188, 212, 0.15);
        }

        .log-type.error {
            color: #e74c3c;
            background: rgba(231, 76, 60, 0.15);
        }

        .log-type.api_call {
            color: #95a5a6;
            background: rgba(149, 165, 166, 0.15);
        }

        .log-type.queue_process {
            color: #16a085;
            background: rgba(22, 160, 133, 0.15);
        }

        .log-type.blacklist {
            color: #c0392b;
            background: rgba(192, 57, 43, 0.15);
        }

        .log-type.spintax {
            color: #d35400;
            background: rgba(211, 84, 0, 0.15);
        }

        .log-type.media_download {
            color: #2980b9;
            background: rgba(41, 128, 185, 0.15);
        }

        .log-level {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .log-level.debug {
            background: var(--bg-secondary);
            color: var(--text-secondary);
        }

        .log-level.info {
            background: rgba(0, 217, 255, 0.2);
            color: var(--accent-primary);
        }

        .log-level.warning {
            background: rgba(255, 170, 0, 0.2);
            color: var(--accent-warning);
        }

        .log-level.error {
            background: rgba(255, 71, 87, 0.2);
            color: var(--accent-error);
        }

        .log-level.critical {
            background: rgba(255, 0, 102, 0.3);
            color: var(--accent-critical);
        }

        .log-message {
            color: var(--text-primary);
        }

        .log-details {
            grid-column: 1 / -1;
            margin-top: 8px;
            padding: 12px;
            background: var(--bg-secondary);
            border-radius: 6px;
            font-size: 12px;
            color: var(--text-secondary);
            display: none;
        }

        .log-explanation {
            background: rgba(0, 217, 255, 0.1);
            border: 1px solid rgba(0, 217, 255, 0.3);
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 8px;
            color: #00e5ff;
            font-size: 14px;
            line-height: 1.6;
        }

        .log-explanation::before {
            content: '💡 ';
        }

        .log-explanation.critical {
            background: rgba(255, 0, 102, 0.15);
            border-color: var(--accent-critical);
            color: #ff6b9d;
        }

        .log-explanation.critical::before {
            content: '⚠️ ';
        }

        .log-details-json {
            font-family: 'Consolas', monospace;
            white-space: pre-wrap;
            background: rgba(0, 0, 0, 0.4);
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 11px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .log-details-json::before {
            content: '📋 Technical Details:';
            display: block;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .log-profile {
            font-size: 11px;
            color: var(--text-secondary);
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .log-profile .profile-name {
            color: var(--accent-primary);
            font-weight: 600;
        }

        .log-profile .profile-phone {
            color: var(--accent-success);
        }

        .log-profile .profile-uuid {
            font-size: 9px;
            color: var(--text-secondary);
            opacity: 0.7;
        }

        .log-entry.expanded .log-details {
            display: block;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .log-entry {
                grid-template-columns: 1fr;
                gap: 8px;
            }

            .stats-bar {
                grid-template-columns: repeat(2, 1fr);
            }

            .filters-bar {
                flex-direction: column;
                align-items: stretch;
            }

            .filter-group {
                width: 100%;
            }

            .filter-group select {
                flex: 1;
            }
        }

        /* History Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background-color: var(--bg-primary);
            margin: 5% auto;
            padding: 0;
            border: 1px solid var(--border-color);
            width: 80%;
            max-width: 900px;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            animation: modalSlideIn 0.3s ease;
            display: flex;
            flex-direction: column;
            max-height: 85vh;
        }

        @keyframes modalSlideIn {
            from {
                transform: translateY(-30px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-content h2 {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color);
            margin: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-modal {
            color: var(--text-secondary);
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close-modal:hover {
            color: var(--accent-error);
        }

        .profile-info-card {
            padding: 16px 24px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            gap: 20px;
        }

        .history-table-container {
            padding: 0;
            overflow-y: auto;
            flex: 1;
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
        }

        .history-table th,
        .history-table td {
            padding: 12px 24px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .history-table th {
            background: var(--bg-secondary);
            color: var(--text-secondary);
            font-size: 12px;
            text-transform: uppercase;
            position: sticky;
            top: 0;
        }

        .history-table tr:hover {
            background: var(--bg-secondary);
        }

        .btn-history {
            padding: 8px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-history:hover:not(:disabled) {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        .btn-history:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <!-- Login Screen -->
    <div class="login-container" id="loginScreen">
        <div class="login-card">
            <h1><i class="fas fa-shield-alt"></i> Admin Logs</h1>
            <p>Enter your credentials to access the logs dashboard</p>

            <div class="error-message" id="loginError"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="admin@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>
        </div>
    </div>

    <!-- Dashboard -->
    <div class="dashboard" id="dashboard">
        <header class="header">
            <h1><i class="fas fa-terminal"></i> Profile Logs</h1>
            <div class="header-actions">
                <div class="connection-status">
                    <span class="status-dot" id="socketStatus"></span>
                    <span id="socketStatusText">Connecting...</span>
                </div>
                <button class="btn-logout" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </header>

        <div class="stats-bar">
            <div class="stat-card sent">
                <div class="count" id="statSent">0</div>
                <div class="label">Messages Sent</div>
            </div>
            <div class="stat-card failed">
                <div class="count" id="statFailed">0</div>
                <div class="label">Failed</div>
            </div>
            <div class="stat-card warning">
                <div class="count" id="statWarning">0</div>
                <div class="label">Warnings</div>
            </div>
            <div class="stat-card block">
                <div class="count" id="statBlocks">0</div>
                <div class="label">Blocks Detected</div>
            </div>
        </div>

        <div class="filters-bar">
            <div class="filter-group">
                <label>Search:</label>
                <input type="text" id="searchInput" placeholder="UUID, device name, phone..."
                    style="padding: 8px 12px; border: 1px solid var(--border-color); border-radius: 6px; background: var(--bg-card); color: var(--text-primary); width: 180px;">
            </div>
            <div class="filter-group">
                <label>Profile:</label>
                <select id="filterProfile">
                    <option value="">All Profiles</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Type:</label>
                <select id="filterType">
                    <option value="">All Types</option>
                    <option value="connection">🔌 Connection</option>
                    <option value="message_sent">✅ Message Sent</option>
                    <option value="message_failed">❌ Message Failed</option>
                    <option value="message_received">📩 Message Received</option>
                    <option value="message_delivered">📬 Delivered</option>
                    <option value="message_read">👁️ Read</option>
                    <option value="webhook_sent">📤 Webhook Sent</option>
                    <option value="webhook_incoming">📥 Webhook Incoming</option>
                    <option value="auto_reply">🤖 Auto Reply</option>
                    <option value="customer_replied">💬 Customer Replied</option>
                    <option value="batch_created">📦 Batch Created</option>
                    <option value="batch_completed">✔️ Batch Completed</option>
                    <option value="block_detected">🚫 Block Detected</option>
                    <option value="session_restore">🔄 Session Restore</option>
                    <option value="error">⚠️ Error</option>
                    <option value="warning">⚡ Warning</option>
                    <option value="queue_process">📋 Queue Process</option>
                    <option value="typing_simulation">⌨️ Typing</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Level:</label>
                <select id="filterLevel">
                    <option value="">All Levels</option>
                    <option value="debug">Debug</option>
                    <option value="info">Info</option>
                    <option value="warning">Warning</option>
                    <option value="error">Error</option>
                    <option value="critical">Critical</option>
                </select>
            </div>
            <button class="btn-history" id="viewHistoryBtn" disabled title="Select a profile first">
                <i class="fas fa-history"></i> History
            </button>
            <button class="btn-clear" id="clearLogs">
                <i class="fas fa-trash"></i> Clear Display
            </button>
        </div>

        <div class="logs-container" id="logsContainer">
            <div class="empty-state">
                <i class="fas fa-inbox"></i>
                <p>Waiting for logs...</p>
            </div>
        </div>
    </div>

    <!-- History Modal -->
    <div id="historyModal" class="modal">
        <div class="modal-content">
            <h2>
                Connection History
                <span class="close-modal">&times;</span>
            </h2>
            <div id="historyProfileInfo" class="profile-info-card"></div>
            <div class="history-table-container">
                <table class="history-table">
                    <thead>
                        <tr>
                            <th>Status Details</th>
                            <th>Time</th>
                            <th>Duration / Reason</th>
                        </tr>
                    </thead>
                    <tbody id="historyTableBody">
                        <!-- Rows -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // State
        let token = localStorage.getItem('adminToken');
        let socket = null;
        let logs = [];
        let stats = {
            sent: 0,
            failed: 0,
            warning: 0,
            blocks: 0
        };

        // Elements
        const loginScreen = document.getElementById('loginScreen');
        const dashboard = document.getElementById('dashboard');
        const loginForm = document.getElementById('loginForm');
        const loginError = document.getElementById('loginError');
        const logoutBtn = document.getElementById('logoutBtn');
        const logsContainer = document.getElementById('logsContainer');
        const filterProfile = document.getElementById('filterProfile');
        const viewHistoryBtn = document.getElementById('viewHistoryBtn'); // New button
        const historyModal = document.getElementById('historyModal'); // New modal
        const closeModal = document.querySelector('.close-modal'); // New close button
        const filterType = document.getElementById('filterType');
        const filterLevel = document.getElementById('filterLevel');
        const clearLogs = document.getElementById('clearLogs');
        const socketStatus = document.getElementById('socketStatus');
        const socketStatusText = document.getElementById('socketStatusText');
        const profiles = new Map(); // Cache profiles for filter

        // Check if already logged in
        if (token) {
            verifyToken();
        }

        // Login form submit
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.success) {
                    token = data.token;
                    localStorage.setItem('adminToken', token);

                    // Call showDashboard inside a localized try-catch to avoid triggering "Connection error"
                    try {
                        showDashboard();
                    } catch (uiError) {
                        console.error("UI Error after login:", uiError);
                        alert("Login successful, but UI failed to load: " + uiError.message);
                    }
                } else {
                    showLoginError(data.error);
                }
            } catch (error) {
                console.error("Login request failed:", error);
                showLoginError('Connection error: ' + error.message);
            }
        });

        // Logout
        logoutBtn.addEventListener('click', async () => {
            try {
                await fetch('/api/admin/logout', {
                    method: 'POST',
                    headers: { 'X-Admin-Token': token }
                });
            } catch (e) { }

            localStorage.removeItem('adminToken');
            token = null;
            if (socket) socket.disconnect();
            showLogin();
        });

        // Verify token
        async function verifyToken() {
            try {
                const response = await fetch('/api/admin/verify', {
                    headers: { 'X-Admin-Token': token }
                });

                if (response.ok) {
                    showDashboard();
                } else {
                    localStorage.removeItem('adminToken');
                    showLogin();
                }
            } catch (error) {
                showLogin();
            }
        }

        // Load profiles from database for dropdown
        async function loadProfiles(search = '') {
            try {
                let url = '/api/admin/profiles';
                if (search) url += `?search=${encodeURIComponent(search)}`;

                const response = await fetch(url, {
                    headers: { 'X-Admin-Token': token }
                });
                if (response.ok) {
                    const data = await response.json();
                    if (data.success) {
                        const currentValue = filterProfile.value;
                        filterProfile.innerHTML = '<option value="">All Profiles</option>';
                        data.profiles.forEach(profile => {
                            profiles.set(profile.id, profile);
                            const option = document.createElement('option');
                            option.value = profile.id;
                            option.textContent = `${profile.device_name || 'Unnamed'} (${profile.phone_number || 'No number'})`;
                            filterProfile.appendChild(option);
                        });

                        if (currentValue) filterProfile.value = currentValue;
                    }
                }
            } catch (error) {
                console.error('Error loading profiles:', error);
            }
        }

        // Show/hide screens
        function showLogin() {
            loginScreen.style.display = 'flex';
            dashboard.style.display = 'none';
        }

        function showDashboard() {
            loginScreen.style.display = 'none';
            dashboard.style.display = 'block';
            connectSocket();
            loadProfiles();
            loadInitialLogs();
        }


        // Search input handling
        const searchInput = document.getElementById('searchInput');
        let searchDebounce;
        searchInput?.addEventListener('input', () => {
            clearTimeout(searchDebounce);
            searchDebounce = setTimeout(async () => {
                const search = searchInput.value.trim();
                if (search) {
                    try {
                        const response = await fetch(`/api/admin/profiles?search=${encodeURIComponent(search)}`, {
                            headers: { 'X-Admin-Token': token }
                        });
                        if (response.ok) {
                            const data = await response.json();
                            if (data.success && data.profiles.length > 0) {
                                filterProfile.value = data.profiles[0].id;
                                filterProfile.dispatchEvent(new Event('change'));
                            }
                        }
                    } catch (e) { }
                }
            }, 300);
        });

        function showLoginError(message) {
            loginError.textContent = message;
            loginError.style.display = 'block';
        }

        // Socket connection
        function connectSocket() {
            socket = io();

            socket.on('connect', () => {
                socket.emit('join-admin-logs', token);
            });

            socket.on('admin-logs-joined', (data) => {
                if (data.success) {
                    socketStatus.classList.add('connected');
                    socketStatusText.textContent = 'Live';
                } else {
                    socketStatus.classList.remove('connected');
                    socketStatusText.textContent = 'Auth Failed';
                }
            });

            socket.on('new_log', (log) => {
                addLog(log);
                updateStats(log);
            });

            socket.on('disconnect', () => {
                socketStatus.classList.remove('connected');
                socketStatusText.textContent = 'Disconnected';
            });
        }

        // Load initial logs
        async function loadInitialLogs() {
            try {
                const response = await fetch('/api/admin/logs?limit=50', {
                    headers: { 'X-Admin-Token': token }
                });

                const data = await response.json();
                if (data.success) {
                    logsContainer.innerHTML = '';
                    data.logs.reverse().forEach(log => addLog(log, false));

                    // Calculate initial stats
                    data.logs.forEach(log => updateStats(log, false));
                    updateStatsDisplay();
                }
            } catch (error) {
                console.error('Error loading logs:', error);
            }
        }

        // Add log entry
        function addLog(log, animate = true) {
            // Apply filters
            if (filterProfile.value && log.client_id != filterProfile.value) return;
            if (filterType.value && log.log_type !== filterType.value) return;
            if (filterLevel.value && log.log_level !== filterLevel.value) return;

            // Update profile filter dropdown
            if (log.client_id && !profiles.has(log.client_id)) {
                profiles.set(log.client_id, {
                    name: log.profile_name || 'Unknown',
                    phone: log.profile_phone || null
                });
                updateProfileFilter();
            }

            const entry = document.createElement('div');
            entry.className = `log-entry ${log.log_level}`;
            if (!animate) entry.style.animation = 'none';

            const time = new Date(log.created_at).toLocaleTimeString('en-GB', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });

            // Build profile info
            const profileName = log.profile_name || 'Unknown';
            const profilePhone = log.profile_phone || 'No phone';
            const profileUuid = log.profile_uuid ? log.profile_uuid.substring(0, 8) + '...' : 'N/A';

            // Build details section with explanation
            let detailsHtml = '';
            if (log.details || log.explanation) {
                const explanation = log.explanation || log.details?.explanation || '';
                const jsonDetails = { ...log.details };
                delete jsonDetails.explanation;

                // Add critical class for block-related logs
                const isCritical = log.log_type === 'block_detected' || log.log_level === 'critical';
                const explanationClass = isCritical ? 'log-explanation critical' : 'log-explanation';

                detailsHtml = `
                    <div class="log-details">
                        ${explanation ? `<div class="${explanationClass}">${escapeHtml(explanation)}</div>` : ''}
                        ${Object.keys(jsonDetails).length > 0 ? `<div class="log-details-json">${JSON.stringify(jsonDetails, null, 2)}</div>` : ''}
                    </div>
                `;
            }

            entry.innerHTML = `
                <span class="log-time">${time}</span>
                <div class="log-profile">
                    <span class="profile-name">${escapeHtml(profileName)}</span>
                    <span class="profile-phone">${escapeHtml(profilePhone)}</span>
                    <span class="profile-uuid">${profileUuid}</span>
                </div>
                <span class="log-type ${log.log_type}">${log.log_type.replace(/_/g, ' ')}</span>
                <span class="log-level ${log.log_level}">${log.log_level}</span>
                <span class="log-message">${escapeHtml(log.message)}</span>
                ${detailsHtml}
            `;

            entry.addEventListener('click', () => {
                entry.classList.toggle('expanded');
            });

            // Remove empty state if present
            const emptyState = logsContainer.querySelector('.empty-state');
            if (emptyState) emptyState.remove();

            // Add to top
            logsContainer.insertBefore(entry, logsContainer.firstChild);

            // Limit displayed logs
            while (logsContainer.children.length > 200) {
                logsContainer.removeChild(logsContainer.lastChild);
            }
        }

        // Update profile filter dropdown
        function updateProfileFilter() {
            const currentValue = filterProfile.value;
            filterProfile.innerHTML = '<option value="">All Profiles</option>';
            profiles.forEach((info, id) => {
                const label = info.phone ? `${info.name} (${info.phone})` : info.name;
                filterProfile.innerHTML += `<option value="${id}">${escapeHtml(label)}</option>`;
            });
            filterProfile.value = currentValue;
        }

        // Update stats
        function updateStats(log, display = true) {
            switch (log.log_type) {
                case 'message_sent':
                    stats.sent++;
                    break;
                case 'message_failed':
                    stats.failed++;
                    break;
                case 'warning':
                    stats.warning++;
                    break;
                case 'block_detected':
                    stats.blocks++;
                    break;
            }

            if (display) updateStatsDisplay();
        }

        function updateStatsDisplay() {
            document.getElementById('statSent').textContent = stats.sent;
            document.getElementById('statFailed').textContent = stats.failed;
            document.getElementById('statWarning').textContent = stats.warning;
            document.getElementById('statBlocks').textContent = stats.blocks;
        }

        // Handle History Button
        filterProfile.addEventListener('change', () => {
            if (filterProfile.value) {
                viewHistoryBtn.disabled = false;
                viewHistoryBtn.title = "View connection history";
            } else {
                viewHistoryBtn.disabled = true;
                viewHistoryBtn.title = "Select a profile first";
            }
        });

        viewHistoryBtn.addEventListener('click', async () => {
            const profileId = filterProfile.value;
            if (!profileId) return;

            // Show modal
            historyModal.style.display = 'block';
            document.getElementById('historyTableBody').innerHTML = '<tr><td colspan="3" style="text-align:center">Loading history...</td></tr>';

            // Populate profile info header
            const profile = profiles.get(parseInt(profileId));
            if (profile) {
                document.getElementById('historyProfileInfo').innerHTML = `
                    <div style="flex:1">
                        <div style="color:var(--text-secondary);font-size:12px">Device</div>
                        <div style="font-weight:bold;font-size:16px">${profile.device_name}</div>
                    </div>
                    <div style="flex:1">
                        <div style="color:var(--text-secondary);font-size:12px">Phone</div>
                        <div style="color:var(--accent-success);font-weight:bold">${profile.phone_number || 'N/A'}</div>
                    </div>
                    <div style="flex:1">
                        <div style="color:var(--text-secondary);font-size:12px">UUID</div>
                        <div style="font-family:monospace">${profile.uuid}</div>
                    </div>
                `;
            }

            try {
                const res = await fetch(`/api/admin/profile/${profileId}/history`, {
                    headers: { 'X-Admin-Token': token }
                });
                const data = await res.json();

                if (data.success) {
                    const tbody = document.getElementById('historyTableBody');
                    tbody.innerHTML = '';

                    if (data.history.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;padding:20px">No connection history found</td></tr>';
                        return;
                    }

                    data.history.forEach(log => {
                        const row = document.createElement('tr');
                        const date = new Date(log.created_at).toLocaleString();
                        const details = log.details || {};

                        let statusHtml = `<span class="log-level ${log.log_level}">${log.message}</span>`;
                        let extra = log.explanation || '';

                        row.innerHTML = `
                            <td>
                                ${statusHtml}
                                <div style="font-size:12px;color:var(--text-secondary);margin-top:4px">${extra}</div>
                            </td>
                            <td style="font-family:monospace;white-space:nowrap">${date}</td>
                            <td style="font-size:12px">
                                ${details.reason ? 'Reason: ' + details.reason : ''}
                                ${details.durationMs ? 'Duration: ' + (details.durationMs / 1000).toFixed(1) + 's' : ''}
                            </td>
                        `;
                        tbody.appendChild(row);
                    });
                }
            } catch (err) {
                document.getElementById('historyTableBody').innerHTML = '<tr><td colspan="3" style="color:var(--accent-error)">Error loading history</td></tr>';
            }
        });

        // Close Modal
        closeModal.onclick = () => {
            historyModal.style.display = 'none';
        }

        window.onclick = (event) => {
            if (event.target == historyModal) {
                historyModal.style.display = 'none';
            }
        }

        // Filters
        filterProfile.addEventListener('change', () => loadInitialLogs());
        filterType.addEventListener('change', () => loadInitialLogs());
        filterLevel.addEventListener('change', () => loadInitialLogs());

        clearLogs.addEventListener('click', () => {
            logsContainer.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>Display cleared. Waiting for new logs...</p></div>';
            stats = { sent: 0, failed: 0, warning: 0, blocks: 0 };
            updateStatsDisplay();
        });

        // Helper
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>

</html>
