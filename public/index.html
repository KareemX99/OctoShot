<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ربط الجهاز | اكــتوشــوت واتساب</title>
    <meta name="description" content="منصة اكــتوشــوت واتساب - اربط رقمك وأرسل رسائل لأي رقم">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <style>
        /* Home Page Specific Styles */
        .home-layout {
            display: flex;
            min-height: 100vh;
        }

        .home-content {
            flex: 1;
            margin-right: 240px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            min-height: 100vh;
        }

        @media (max-width: 768px) {
            .home-content {
                margin-right: 65px;
                grid-template-columns: 1fr;
            }
        }

        .panel {
            display: flex;
            flex-direction: column;
            padding: 2rem;
            position: relative;
        }

        .panel-qr {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .panel-message {
            background: var(--bg-color);
        }

        .panel-header {
            margin-bottom: 1.5rem;
        }

        .panel-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .panel-header p {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .panel-body {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* QR Container in panel */
        .panel-qr .qr-box {
            background: white;
            border-radius: 16px;
            padding: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 250px;
            margin-bottom: 1.5rem;
        }

        .panel-qr .qr-box .spinner {
            border-color: rgba(102, 126, 234, 0.2);
            border-top-color: #667eea;
        }

        .panel-qr .qr-placeholder {
            text-align: center;
            color: #667eea;
        }

        .panel-qr .qr-placeholder p {
            margin-top: 0.75rem;
            color: #667eea;
        }

        .panel-qr #qrCodeDiv {
            display: none;
        }

        .panel-qr .qr-box.has-qr #qrCodeDiv {
            display: block;
        }

        .panel-qr .qr-box.has-qr .qr-placeholder {
            display: none;
        }

        .panel-qr .instructions {
            margin-top: auto;
        }

        .panel-qr .instruction-step {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            margin-bottom: 0.5rem;
            backdrop-filter: blur(10px);
        }

        .panel-qr .step-number {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: white;
            color: #667eea;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        /* Message Panel */
        .panel-message .connected-box {
            display: none;
            padding: 1rem;
            background: rgba(39, 174, 96, 0.1);
            border: 1px solid rgba(39, 174, 96, 0.2);
            border-radius: 12px;
            margin-bottom: 1.5rem;
        }

        .panel-message .connected-box.visible {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .connected-user {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .connected-user .icon {
            font-size: 1.5rem;
        }

        .connected-user strong {
            color: #27ae60;
            display: block;
        }

        .connected-user span {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .panel-message .msg-form {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .panel-message .form-group {
            margin-bottom: 1.25rem;
        }

        .panel-message .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .panel-message .input-field {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 1.5px solid var(--border-color);
            border-radius: 10px;
            background: var(--card-bg);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.9rem;
            transition: border-color 0.3s;
        }

        .panel-message .input-field:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .panel-message textarea.input-field {
            resize: none;
            flex: 1;
            min-height: 120px;
        }

        .panel-message .hint {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        .panel-message .submit-btn {
            margin-top: auto;
            padding: 1rem;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .panel-message .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 172, 254, 0.4);
        }

        .panel-message .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Theme Toggle in Sidebar */
        .sidebar-footer .theme-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 0.75rem;
            padding-top: 0.75rem;
            border-top: 1px solid var(--border-color);
        }

        .theme-row span {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .theme-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .theme-btn:hover {
            background: var(--hover-bg);
        }
    </style>
</head>

<body>
    <div class="home-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">🐙</span>
                    <span class="logo-text">اكــتوشــوت</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="/profiles" class="nav-item">
                    <span class="nav-icon">📱</span>
                    <span class="nav-text">الأجهزة</span>
                </a>
                <a href="/api-docs" class="nav-item">
                    <span class="nav-icon">📚</span>
                    <span class="nav-text">دليل API للمطورين</span>
                </a>
                <a href="/api-logs" class="nav-item">
                    <span class="nav-icon">📋</span>
                    <span class="nav-text">سجل الرسائل</span>
                </a>
                <a href="/dashboard" class="nav-item">
                    <span class="nav-icon">📊</span>
                    <span class="nav-text">لوحة التحكم</span>
                </a>
                <a href="/chats" class="nav-item">
                    <span class="nav-icon">💬</span>
                    <span class="nav-text">المحادثات</span>
                </a>
                <a href="/spintax" class="nav-item">
                    <span class="nav-icon">✨</span>
                    <span class="nav-text">مولد الرسائل الذكي</span>
                </a>
                <a href="/campaigns" class="nav-item">
                    <span class="nav-icon">📣</span>
                    <span class="nav-text">الحملات</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="theme-row">
                    <span>الوضع</span>
                    <button class="theme-btn" id="themeToggle" title="تبديل الوضع">
                        <span class="theme-icon">🌙</span>
                    </button>
                </div>
            </div>
        </aside>

        <!-- Main Content - Blank -->
        <main class="home-content">
            <!-- Content cleared as requested -->
        </main>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
