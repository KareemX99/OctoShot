<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل الحملة | اكــتوشــوت واتساب</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/sidebar.css">
    <link rel="stylesheet" href="/css/animations.css">
    <link rel="stylesheet" href="/css/premium.css">
    <link rel="stylesheet" href="/css/icons.css">
    <link rel="stylesheet" href="/css/campaigns.css">
    <style>
        /* Campaign Detail Styles - Premium Design */
        :root {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --border-color: rgba(139, 92, 246, 0.1);
            --accent-primary: #8b5cf6;
            --accent-secondary: #06b6d4;
            --accent-success: #10b981;
            --accent-warning: #f59e0b;
            --accent-error: #ef4444;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
        }

        body {
            background: linear-gradient(135deg, #f0f4ff 0%, #e8f0ff 50%, #f0f9ff 100%);
            color: var(--text-primary);
            font-family: 'Tajawal', 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
        }

        .detail-container {
            padding: 32px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .back-link {
            color: var(--text-secondary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--accent-primary);
        }

        .campaign-title {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .campaign-title h1 {
            margin: 0;
            font-size: 1.6rem;
        }

        .status-badge {
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            border: 1px solid transparent;
        }

        .status-running {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.15), rgba(16, 185, 129, 0.25));
            color: #10b981;
            border-color: rgba(16, 185, 129, 0.3);
        }

        .status-paused {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.15), rgba(245, 158, 11, 0.25));
            color: #f59e0b;
            border-color: rgba(245, 158, 11, 0.3);
        }

        .status-completed {
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.15), rgba(139, 92, 246, 0.15));
            color: #06b6d4;
            border-color: rgba(6, 182, 212, 0.3);
        }

        .status-draft {
            background: linear-gradient(135deg, rgba(100, 116, 139, 0.15), rgba(100, 116, 139, 0.25));
            color: #64748b;
            border-color: rgba(100, 116, 139, 0.3);
        }

        .status-failed,
        .status-cancelled {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.15), rgba(239, 68, 68, 0.25));
            color: #ef4444;
            border-color: rgba(239, 68, 68, 0.3);
        }

        /* Progress Section */
        .progress-section {
            background: var(--bg-card);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            padding: 28px;
            margin-bottom: 24px;
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.08);
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .progress-header h2 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-primary);
        }

        .progress-bar-large {
            height: 28px;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.08), rgba(6, 182, 212, 0.08));
            border-radius: 14px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #8b5cf6, #06b6d4, #10b981);
            border-radius: 14px;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.9;
            }
        }

        .progress-fill::after {
            content: attr(data-percent);
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #fff;
            font-weight: 700;
            font-size: 13px;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
        }

        .stat-item {
            text-align: center;
            padding: 20px 16px;
            background: linear-gradient(135deg, rgba(248, 250, 252, 0.8), rgba(255, 255, 255, 0.9));
            border-radius: 16px;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .stat-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(139, 92, 246, 0.12);
        }

        .stat-value {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--accent-primary);
            line-height: 1.2;
        }

        .stat-value.success {
            color: var(--accent-success);
        }

        .stat-value.warning {
            color: var(--accent-warning);
        }

        .stat-value.error {
            color: var(--accent-error);
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 600;
            margin-top: 6px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        /* Info Cards */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 24px;
            margin-bottom: 24px;
        }

        .info-card {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            padding: 24px;
        }

        .info-card h3 {
            margin: 0 0 16px;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: var(--text-secondary);
        }

        .info-value {
            font-weight: 600;
        }

        /* Messages Timeline */
        .messages-card {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            padding: 24px;
            margin-bottom: 24px;
        }

        .messages-card h3 {
            margin: 0 0 20px;
        }

        .step-timeline {
            position: relative;
            padding-left: 30px;
        }

        .step-timeline::before {
            content: '';
            position: absolute;
            left: 10px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--border-color);
        }

        .timeline-item {
            position: relative;
            margin-bottom: 24px;
            padding: 16px;
            background: var(--bg-secondary);
            border-radius: 12px;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -26px;
            top: 20px;
            width: 12px;
            height: 12px;
            background: var(--accent-primary);
            border-radius: 50%;
        }

        .timeline-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .timeline-type {
            color: var(--text-secondary);
            font-size: 12px;
        }

        .timeline-delay {
            color: var(--accent-warning);
            font-size: 12px;
        }

        .timeline-content {
            font-size: 14px;
            line-height: 1.6;
        }

        /* Enrollments Table */
        .enrollments-card {
            background: var(--bg-card);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.08);
        }

        .enrollments-header {
            padding: 24px 28px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.03), rgba(6, 182, 212, 0.03));
        }

        .enrollments-header h3 {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-primary);
        }

        .enrollments-table {
            width: 100%;
            border-collapse: collapse;
        }

        .enrollments-table th,
        .enrollments-table td {
            padding: 16px 24px;
            text-align: right;
        }

        .enrollments-table th {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.05), rgba(6, 182, 212, 0.05));
            color: var(--text-secondary);
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid var(--border-color);
        }

        .enrollments-table tbody tr {
            border-bottom: 1px solid rgba(139, 92, 246, 0.06);
            transition: all 0.2s ease;
        }

        .enrollments-table tbody tr:hover {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.04), rgba(6, 182, 212, 0.04));
            transform: translateX(-2px);
        }

        .enrollments-table tbody tr.expanded {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.08), rgba(6, 182, 212, 0.08));
        }

        .enrollments-table td {
            font-size: 14px;
            color: var(--text-primary);
        }

        .enrollments-table td:first-child {
            font-weight: 600;
            color: var(--accent-primary);
        }

        /* Row Number Badge */
        .row-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(6, 182, 212, 0.1));
            border-radius: 10px;
            font-weight: 700;
            font-size: 13px;
            color: var(--accent-primary);
        }

        /* Phone Number */
        .phone-number {
            font-family: 'Plus Jakarta Sans', monospace;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: 0.5px;
        }

        /* Recipient Name */
        .recipient-name {
            color: var(--text-secondary);
            font-size: 13px;
        }

        /* Status Pill Badges */
        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
        }

        .status-pill.read {
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.15), rgba(139, 92, 246, 0.15));
            color: #06b6d4;
            border: 1px solid rgba(6, 182, 212, 0.3);
        }

        .status-pill.delivered {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.15), rgba(16, 185, 129, 0.25));
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .status-pill.sent {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.15), rgba(245, 158, 11, 0.25));
            color: #f59e0b;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .status-pill.failed {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.15), rgba(239, 68, 68, 0.25));
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .status-pill.active {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.15), rgba(139, 92, 246, 0.25));
            color: #8b5cf6;
            border: 1px solid rgba(139, 92, 246, 0.3);
        }

        .status-pill.pending {
            background: linear-gradient(135deg, rgba(100, 116, 139, 0.1), rgba(100, 116, 139, 0.2));
            color: #64748b;
            border: 1px solid rgba(100, 116, 139, 0.25);
        }

        /* Time Badge */
        .time-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
        }

        .time-badge.completed {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.12), rgba(16, 185, 129, 0.2));
            color: #10b981;
        }

        .time-badge.sent {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.12), rgba(16, 185, 129, 0.2));
            color: #10b981;
        }

        .time-badge.pending {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.12), rgba(245, 158, 11, 0.2));
            color: #f59e0b;
        }

        .time-badge.in-progress {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.12), rgba(139, 92, 246, 0.2));
            color: #8b5cf6;
        }

        /* Progress Badge */
        .progress-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 6px 12px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
        }

        .progress-badge.full {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.12), rgba(16, 185, 129, 0.2));
            color: #10b981;
        }

        .progress-badge.partial {
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.12), rgba(139, 92, 246, 0.12));
            color: #8b5cf6;
        }

        .progress-badge.empty {
            background: linear-gradient(135deg, rgba(100, 116, 139, 0.1), rgba(100, 116, 139, 0.15));
            color: #64748b;
        }

        /* Buttons */
        .btn {
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
            font-size: 14px;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.25);
        }

        .btn-primary:hover {
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.35);
        }

        .btn-success {
            background: linear-gradient(135deg, #10b981, #059669);
            color: #fff;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.25);
        }

        .btn-success:hover {
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.35);
        }

        .btn-warning {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #fff;
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.25);
        }

        .btn-warning:hover {
            box-shadow: 0 8px 20px rgba(245, 158, 11, 0.35);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.25);
        }

        .btn-danger:hover {
            box-shadow: 0 8px 20px rgba(239, 68, 68, 0.35);
        }

        .btn-secondary {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(248, 250, 252, 0.9));
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .btn-secondary:hover {
            border-color: var(--accent-primary);
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.15);
        }

        .action-buttons {
            display: flex;
            gap: 12px;
        }

        /* ETA */
        .eta-box {
            background: rgba(0, 217, 255, 0.1);
            border: 1px solid var(--accent-primary);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .eta-label {
            color: var(--text-secondary);
            font-size: 13px;
        }

        .eta-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent-primary);
        }

        /* Loading */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--border-color);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Expandable Rows */
        .enrollments-table tbody tr {
            cursor: pointer;
            transition: background 0.2s;
        }

        .enrollments-table tbody tr.expanded {
            background: rgba(0, 217, 255, 0.1);
        }

        .message-preview {
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--text-secondary);
            font-size: 13px;
        }

        .expand-row {
            background: var(--bg-secondary) !important;
            display: none;
        }

        .expand-row.show {
            display: table-row;
        }

        .expand-content {
            padding: 20px;
        }

        .message-bubble {
            background: #dcf8c6;
            color: #000;
            padding: 12px 16px;
            border-radius: 8px 8px 0 8px;
            margin-bottom: 16px;
            max-width: 500px;
            font-size: 14px;
            line-height: 1.6;
            direction: rtl;
        }

        .delivery-timeline {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }

        .timeline-step {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--bg-card);
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .timeline-step.success {
            border-color: var(--accent-success);
        }

        .timeline-step.pending {
            border-color: var(--accent-warning);
            opacity: 0.6;
        }

        .timeline-step .icon {
            font-size: 18px;
        }

        .timeline-step .label {
            color: var(--text-secondary);
            font-size: 12px;
        }

        .timeline-step .time {
            font-size: 13px;
            font-weight: 600;
        }

        /* Schedule Info */
        .schedule-box {
            background: rgba(255, 179, 0, 0.1);
            border: 1px solid var(--accent-warning);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 16px;
        }

        .schedule-label {
            color: var(--text-secondary);
            font-size: 13px;
        }

        .schedule-value {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent-warning);
        }
    </style>
</head>

        <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
        <script>
            const socket = io();
            const campaignId = new URLSearchParams(window.location.search).get('id');
            let campaign = null;

            async function loadCampaign() {
                try {
                    const response = await fetch(`/api/campaigns/${campaignId}`);
                    const data = await response.json();

                    if (!data.success) {
                        document.getElementById('content').innerHTML = `
                        <div style="text-align: center; padding: 60px;">
                            <h2><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" style="color: #ef4444;"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg> الحملة غير موجودة</h2>
                            <a href="/campaigns" class="btn btn-primary">العودة للحملات</a>
                        </div>
                    `;
                        return;
                    }

                    campaign = data.campaign;
                    renderCampaign();

                    // Load enrollments and device stats
                    loadEnrollments();

                    // Load device stats with delay to ensure DOM is ready
                    setTimeout(() => {
                        loadDeviceStats();

                        // Fallback: if still loading after 5s, show message
                        setTimeout(() => {
                            const container = document.getElementById('deviceStatsContainer');
                            if (container && container.querySelector('.spinner')) {
                                container.innerHTML = '<div style="text-align: center; color: var(--text-secondary); padding: 20px;">تعذر تحميل إحصائيات الأجهزة</div>';
                            }
                        }, 5000);
                    }, 100);

                } catch (error) {
                    console.error('Error loading campaign:', error);
                }
            }

            function renderCampaign() {
                // Progress = (sent + failed) / total
                const completedCount = (campaign.sent_count || 0) + (campaign.failed_count || 0);

                // For sequential campaigns, total = recipients * steps, not just recipients
                const uniqueSteps = campaign.steps ? [...new Map(campaign.steps.map(s => [s.step_order, s])).values()] : [];
                const stepsCount = uniqueSteps.length || 1;
                const isSequential = campaign.type === 'sequential' && stepsCount > 1;
                const totalMessages = isSequential
                    ? (campaign.total_recipients || 0) * stepsCount
                    : (campaign.total_recipients || 0);

                const percent = totalMessages > 0
                    ? Math.min(100, Math.round((completedCount / totalMessages) * 100))
                    : 0;

                // Determine the actual display status - if 100% complete, show as completed
                let displayStatus = campaign.status;
                if (percent >= 100 && campaign.status !== 'cancelled' && campaign.status !== 'failed') {
                    displayStatus = 'completed';
                }

                document.getElementById('content').innerHTML = `
                <!-- Header -->
                <a href="/campaigns" class="back-link"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg> العودة للحملات</a>
                
                <div class="page-header">
                    <div class="campaign-title">
                        <h1>${escapeHtml(campaign.name)}</h1>
                        <span class="status-badge status-${displayStatus}">
                            ${getStatusText(displayStatus)}
                        </span>
                    </div>
                    <div class="action-buttons">
                        ${renderActionButtons()}
                    </div>
                </div>

                <!-- Progress -->
                <div class="progress-section">
                    <div class="progress-header">
                        <h2><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg> تقدم الحملة</h2>
                        ${campaign.status === 'running' ? `
                            <div class="eta-box">
                                <span class="eta-label">الوقت المتبقي:</span>
                                <span class="eta-value" id="etaValue">${calculateRemainingTime()}</span>
                            </div>
                        ` : ''}
                    </div>
                    <div class="progress-bar-large">
                        <div class="progress-fill" style="width: ${percent}%" data-percent="${percent}%"></div>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-value">${campaign.total_recipients || 0}</div>
                            <div class="stat-label">إجمالي المستلمين</div>
                        </div>
                        ${isSequential ? `
                        <div class="stat-item">
                            <div class="stat-value">${totalMessages}</div>
                            <div class="stat-label">إجمالي الرسائل</div>
                        </div>
                        ` : ''}
                        <div class="stat-item">
                            <div class="stat-value success">${campaign.sent_count || 0}</div>
                            <div class="stat-label">تم الإرسال</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${campaign.delivered_count || 0}</div>
                            <div class="stat-label">تم التسليم</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value warning">${campaign.read_count || 0}</div>
                            <div class="stat-label">تمت القراءة</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value error">${campaign.failed_count || 0}</div>
                            <div class="stat-label">فشل</div>
                        </div>
                    </div>
                </div>

                <!-- Per-Device Stats (shown if multiple devices) -->
                ${(campaign.device_ids && campaign.device_ids.length > 1) ? `
                    <div class="per-device-stats" style="margin-top: 24px;">
                        <h3 style="margin-bottom: 16px;"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg> إحصائيات لكل جهاز</h3>
                        <div id="deviceStatsContainer">
                            <div class="loading"><div class="spinner"></div></div>
                        </div>
                    </div>
                ` : ''}

                <!-- Enrollments -->
                <div class="enrollments-card" style="margin-top: 24px;">
                    <div class="enrollments-header">
                        <h3><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg> المستلمين</h3>
                    </div>
                    <div id="enrollmentsContainer">
                        <div class="loading">
                            <div class="spinner"></div>
                        </div>
                    </div>
                </div>
            `;

                // Attach action handlers
                attachActionHandlers();
            }

            async function loadEnrollments() {
                try {
                    const response = await fetch(`/api/campaigns/${campaignId}/enrollments`);
                    const data = await response.json();

                    if (data.success && data.enrollments.length > 0) {
                        renderEnrollments(data.enrollments);
                    } else {
                        document.getElementById('enrollmentsContainer').innerHTML = `
                        <div style="padding: 40px; text-align: center; color: var(--text-secondary);">
                            لا يوجد مستلمين
                        </div>
                    `;
                    }
                } catch (error) {
                    console.error('Error loading enrollments:', error);
                }
            }

            function renderEnrollments(enrollments) {
                // Get first message step for preview
                const firstStep = campaign.steps?.[0] || {};
                const messageTemplate = firstStep.content || firstStep.media_url || '';

                document.getElementById('enrollmentsContainer').innerHTML = `
                <table class="enrollments-table">
                    <thead>
                        <tr>
                            <th style="width: 60px;">#</th>
                            <th style="width: 130px;">الرقم</th>
                            <th style="width: 100px;">الاسم</th>
                            <th style="width: 140px;">وقت الإرسال</th>
                            <th style="width: 100px;">المتبقي</th>
                            <th style="width: 90px;">الحالة</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${enrollments.slice(0, 50).map((e, index) => {
                    const statusIcon = getDeliveryStatusIcon(e);
                    // For sequential campaigns: show step progress, otherwise show scheduled time
                    // Deduplicate steps array (SQL join causes duplicates)
                    const uniqueSteps = campaign.steps ? [...new Map(campaign.steps.map(s => [s.step_order, s])).values()] : [];
                    const totalSteps = uniqueSteps.length || 1;
                    const currentStep = e.current_step || 0;
                    const isSequential = campaign.type === 'sequential' && totalSteps > 1;

                    let scheduledTime, remainingTime;
                    if (isSequential) {
                        // Show step progress instead of time
                        // currentStep is the step currently QUEUED, so completed = currentStep - 1
                        const completedSteps = Math.max(0, currentStep - 1);
                        if (e.status === 'completed') {
                            scheduledTime = `<span class="time-badge completed"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> تم</span>`;
                            remainingTime = `<span class="progress-badge full">${totalSteps}/${totalSteps}</span>`;
                        } else if (e.status === 'pending') {
                            scheduledTime = `<span class="time-badge pending"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> انتظار</span>`;
                            remainingTime = `<span class="progress-badge empty">0/${totalSteps}</span>`;
                        } else {
                            scheduledTime = e.sent_at ? `<span class="time-badge sent"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" x2="11" y1="2" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> تم</span>` : `<span class="time-badge in-progress"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg> جاري</span>`;
                            remainingTime = `<span class="progress-badge partial">${completedSteps}/${totalSteps}</span>`;
                        }
                    } else {
                        const fmtTime = formatScheduledTime(e.next_execution_at);
                        const calcRemaining = calculateTimeRemaining(e.next_execution_at);
                        if (fmtTime.includes('تم') || calcRemaining.includes('الآن')) {
                            scheduledTime = `<span class="time-badge completed"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> تم</span>`;
                            remainingTime = `<span class="progress-badge full"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> الآن</span>`;
                        } else {
                            scheduledTime = `<span class="time-badge pending"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> ${fmtTime}</span>`;
                            remainingTime = `<span class="progress-badge partial"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> ${calcRemaining}</span>`;
                        }
                    }

                    return `
                            <tr onclick="toggleExpandRow(${index})" data-index="${index}">
                                <td><span class="row-number">${index + 1}</span></td>
                                <td><span class="phone-number">${e.recipient}</span></td>
                                <td><span class="recipient-name">${escapeHtml(e.recipient_name) || '-'}</span></td>
                                <td>${scheduledTime}</td>
                                <td>${remainingTime}</td>
                                <td>${statusIcon}</td>
                            </tr>
                            <tr class="expand-row" id="expand-${index}">
                                <td colspan="6">
                                    <div class="expand-content" style="display: flex; gap: 24px; flex-wrap: wrap;">
                                        <!-- Left Panel: Recipient Details -->
                                        <div class="recipient-panel" style="flex: 1; min-width: 280px; background: var(--bg-card); border-radius: 12px; padding: 16px; border: 1px solid var(--border-color);">
                                            <!-- Device Info -->
                                            <div style="margin-bottom: 16px;">
                                                <div style="color: var(--text-secondary); font-size: 12px; margin-bottom: 4px;"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" style="margin-left: 4px;"><rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><path d="M12 18h.01"/></svg> الجهاز المُرسِل</div>
                                                <div style="font-weight: 600; color: var(--accent-primary);">جهاز #${campaign.device_id}</div>
                                            </div>
                                            
                                            <!-- Action Buttons -->
                                            <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;">
                                                <button onclick="copyNumber('${e.recipient}'); event.stopPropagation();" class="action-btn" style="padding: 8px 12px; background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-primary); cursor: pointer; font-size: 12px;">
                                                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg> نسخ الرقم
                                                </button>
                                                ${e.status === 'failed' || e.message_status === 'failed' ? `
                                                    <button onclick="retryMessage(${e.id}); event.stopPropagation();" class="action-btn" style="padding: 8px 12px; background: var(--accent-warning); border: none; border-radius: 8px; color: #000; cursor: pointer; font-size: 12px;">

                                                    <div style="font-weight: 600; color: var(--accent-success);">${calculateResponseTime(e.sent_at, e.delivered_at)}</div>

                                        <!-- Right Panel: Messages & Timeline -->

                                    </div>
                                </td>

                    </tbody>
                </table>
                ${enrollments.length > 50 ? `<div style="padding: 16px; text-align: center; color: var(--text-secondary);">و ${enrollments.length - 50} آخرين...</div>` : ''}
            `;
            }

            function formatScheduledTime(dateStr) {
                if (!dateStr) return 'غير محدد';
                const date = new Date(dateStr);
                const now = new Date();

                // If in the past, show "تم"
                if (date <= now) return '✅ تم';

                return date.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
            }

            function calculateTimeRemaining(dateStr) {
                if (!dateStr) return '-';
                const date = new Date(dateStr);
                const now = new Date();
                const diff = date - now;

                if (diff <= 0) return '✅ الآن';

                const mins = Math.floor(diff / 60000);
                const hours = Math.floor(mins / 60);
                const days = Math.floor(hours / 24);

                if (days > 0) return `${days} يوم ${hours % 24} س`;
                if (hours > 0) return `${hours}س ${mins % 60} د`;
                return `${mins} دقيقة`;
            }

            function toggleExpandRow(index) {
                const expandRow = document.getElementById(`expand-${index}`);
                const mainRow = document.querySelector(`tr[data-index="${index}"]`);

                // Close all other expanded rows
                document.querySelectorAll('.expand-row.show').forEach(row => {
                    if (row.id !== `expand-${index}`) {
                        row.classList.remove('show');
                    }
                });
                document.querySelectorAll('tr.expanded').forEach(row => {
                    if (row.dataset.index !== String(index)) {
                        row.classList.remove('expanded');
                    }
                });

                // Toggle current row
                expandRow.classList.toggle('show');
                mainRow.classList.toggle('expanded');
            }

            function resolveVariables(template, enrollment) {
                if (!template) return '';
                let result = template;
                const attrs = enrollment.attributes || {};

                result = result.replace(/\{\{name\}\}/g, enrollment.recipient_name || attrs.name || '');
                result = result.replace(/\{\{phone\}\}/g, enrollment.recipient || attrs.phone || '');
                result = result.replace(/\{\{company\}\}/g, attrs.company || '');

                for (let i = 1; i <= 20; i++) {
                    result = result.replace(new RegExp(`\\{ \\{var${i} \\ } \\ } `, 'g'), attrs[`var${i} `] || '');
                }

                // Process spintax for preview (pick first option)
                result = result.replace(/\{([^{}]*\|[^{}]*)\}/g, (match, options) => {
                    return options.split('|')[0];
                });

                return result;
            }

            function renderMessagesPanel(e, campaign, messageTemplate) {
                // For sequential campaigns, show all messages with their status
                const uniqueSteps = campaign.steps ? [...new Map(campaign.steps.map(s => [s.step_order, s])).values()].sort((a, b) => a.step_order - b.step_order) : [];
                const isSeqCampaign = campaign.type === 'sequential' && uniqueSteps.length > 1;

                if (isSeqCampaign) {
                    // Show all messages for sequential campaign
                    const isCompleted = e.status === 'completed';
                    return uniqueSteps.map(step => {
                        const stepNum = step.step_order;
                        const currentStep = e.current_step || 0;
                        // When enrollment is COMPLETED, all steps are sent
                        // Otherwise, use > not >= because current_step is set when step is QUEUED
                        const isSent = isCompleted || currentStep > stepNum;
                        const isLastSentStep = isCompleted ? (stepNum === uniqueSteps.length) : (currentStep === stepNum + 1);
                        const stepContent = step.media_url ? (step.content || '<span style="display:inline-flex;align-items:center;vertical-align:middle;gap:4px"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg> ' + (step.message_type || 'ملف')) : step.content;

                        // For sent messages, show delivery timeline

                                <div style="display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px;">
                                    <span style="font-size: 11px; padding: 4px 8px; border-radius: 8px; background: rgba(0,255,136,0.2); color: var(--accent-success);">
                                        ✅ تم الإرسال ${e.sent_at ? formatTime(e.sent_at) : ''}
                                    </span>
                                    ${e.delivered_at ? `
                                        <span style="font-size: 11px; padding: 4px 8px; border-radius: 8px; background: rgba(0,217,255,0.2); color: var(--accent-primary);">
                                            ✔️ وصلت ${formatTime(e.delivered_at)}
                                        </span>
                                    ` : `
                                        <span style="font-size: 11px; padding: 4px 8px; border-radius: 8px; background: rgba(255,179,0,0.2); color: var(--accent-warning); display: inline-flex; align-items: center; gap: 4px;">
                                            <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> في انتظار التسليم
                                        </span>
                                    `}
                                    ${e.read_at ? `
                                        <span style="font-size: 11px; padding: 4px 8px; border-radius: 8px; background: rgba(0,217,255,0.3); color: #00d9ff; display: inline-flex; align-items: center; gap: 4px;">
                                            <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg> قُرأت ${formatTime(e.read_at)}
                                        </span>
                                    ` : ''}
                                </div>
                            `;
                            } else {
                                // Previous steps - already delivered
                                statusHtml = `
                                <div style="margin-top: 8px;">
                                    <span style="font-size: 11px; padding: 4px 8px; border-radius: 8px; background: rgba(0,255,136,0.2); color: var(--accent-success); display: inline-flex; align-items: center; gap: 4px;">
                                        <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> تم الإرسال
                                    </span>
                                </div>
                            `;
                            }
                        } else {
                            statusHtml = `
                            <div style="margin-top: 8px;">
                                <span style="font-size: 11px; padding: 4px 8px; border-radius: 8px; background: rgba(255,179,0,0.2); color: var(--accent-warning); display: inline-flex; align-items: center; gap: 4px;">
                                    <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> في الانتظار
                                </span>
                            </div>
                        `;
                        }

                        return `
                        <div style="margin-bottom: 16px; padding: 12px; background: var(--bg-secondary); border-radius: 12px; border-right: 3px solid ${borderColor};">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                                <span style="font-size: 12px; color: var(--text-secondary);">رسالة ${stepNum}</span>
                            </div>
                            <div class="message-bubble" style="margin: 0;">${escapeHtml(resolveVariables(stepContent || '', e)) || 'محتوى الرسالة'}</div>
                            ${statusHtml}
                        </div>
                    `;
                    }).join('');
                } else {
                    // Single message campaign - show original timeline
                    return `
                    <div class="message-bubble">${escapeHtml(resolveVariables(messageTemplate, e)) || 'لم ترسل بعد'}</div>
                    <div class="delivery-timeline">
                        <div class="timeline-step ${e.sent_at ? 'success' : 'pending'}">
                            <span class="icon">${e.sent_at ? '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>' : '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>'}</span>
                            <div>
                                <div class="label">تم الإرسال</div>
                                <div class="time">${e.sent_at ? formatTime(e.sent_at) : 'قيد الانتظار'}</div>
                            </div>
                        </div>
                        <div class="timeline-step ${e.delivered_at ? 'success' : 'pending'}">
                            <span class="icon">${e.delivered_at ? '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L7 17l-5-5"/><path d="m22 10-7.5 7.5L13 16"/></svg>' : '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>'}</span>
                            <div>
                                <div class="label">تم التسليم</div>
                                <div class="time">${e.delivered_at ? formatTime(e.delivered_at) : 'في انتظار'}</div>
                            </div>
                        </div>
                        <div class="timeline-step ${e.read_at ? 'success' : 'pending'}">
                            <span class="icon">${e.read_at ? '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>' : '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>'}</span>
                            <div>
                                <div class="label">تمت القراءة</div>
                                <div class="time">${e.read_at ? formatTime(e.read_at) : 'في انتظار'}</div>
                            </div>
                        </div>
                    </div>
                `;
                }
            }

            function getDeliveryStatusIcon(enrollment) {
                if (enrollment.read_at) {
                    return `<span class="status-pill read">
                        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                        قُرأت
                    </span>`;
                } else if (enrollment.delivered_at) {
                    return `<span class="status-pill delivered">
                        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L7 17l-5-5"/><path d="m22 10-7.5 7.5L13 16"/></svg>
                        وصلت
                    </span>`;
                } else if (enrollment.sent_at || enrollment.status === 'completed') {
                    return `<span class="status-pill sent">
                        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" x2="11" y1="2" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                        مرسلة
                    </span>`;
                } else if (enrollment.status === 'failed') {
                    return `<span class="status-pill failed">
                        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" x2="9" y1="9" y2="15"/><line x1="9" x2="15" y1="9" y2="15"/></svg>
                        فشل
                    </span>`;
                } else if (enrollment.status === 'active') {

                        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
                        نشط
                    </span>`;
                } else {
                    return `<span class="status-pill pending">
                        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                        معلق
                    </span>`;
                }
            }

            function formatTime(dateStr) {
                if (!dateStr) return '-';
                const date = new Date(dateStr);
                return date.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' }) + ' - ' +
                    date.toLocaleDateString('ar-EG', { day: 'numeric', month: 'short' });
            }

            function calculateRemainingTime() {
                const total = campaign.total_recipients || 0;
                const sent = campaign.sent_count || 0;
                const remaining = total - sent;

                if (remaining <= 0) return 'مكتمل';

                // Average 45 seconds per message (including delay and business hours)
                const avgSecondsPerMsg = 45;
                const totalSeconds = remaining * avgSecondsPerMsg;

                const hours = Math.floor(totalSeconds / 3600);
                const minutes = Math.floor((totalSeconds % 3600) / 60);

                if (hours > 0) {
                    return `~${hours} ساعة و ${minutes} دقيقة`;
                } else if (minutes > 0) {
                    return `~${minutes} دقيقة`;
                } else {
                    return 'قريباً جداً';
                }
            }

            async function loadDeviceStats() {
                const container = document.getElementById('deviceStatsContainer');
                console.log('📊 loadDeviceStats called, container:', container);
                if (!container) return;  // Not shown for single-device campaigns

                try {
                    const response = await fetch(`/ api / campaigns / ${campaignId}/device-stats`);
                    const data = await response.json();
                    console.log('📊 Device stats response:', data);

                    if (data.success && data.deviceStats && data.deviceStats.length > 0) {
                        container.innerHTML = `
                        <table style="width: 100%; border-collapse: collapse; background: var(--bg-card); border-radius: 12px; overflow: hidden;">
                            <thead>
                                <tr style="background: var(--bg-secondary);">

                                    <th style="padding: 12px; text-align: center; border-bottom: 1px solid var(--border-color); color: var(--accent-success);">مرسل</th>
                                    <th style="padding: 12px; text-align: center; border-bottom: 1px solid var(--border-color); color: #00ff88;">تسليم</th>
                                    <th style="padding: 12px; text-align: center; border-bottom: 1px solid var(--border-color); color: #00d9ff;">قراءة</th>
                                    <th style="padding: 12px; text-align: center; border-bottom: 1px solid var(--border-color); color: var(--accent-error);">فشل</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${data.deviceStats.map(stat => `
                                    <tr>
                                        <td style="padding: 12px; text-align: right;">
                                            📱 ${stat.device_name || stat.device_phone || 'Device ' + stat.device_id}
                                        </td>
                                        <td style="padding: 12px; text-align: center;">${stat.total_assigned || 0}</td>
                                        <td style="padding: 12px; text-align: center; color: var(--accent-success);">${stat.sent || 0}</td>
                                        <td style="padding: 12px; text-align: center; color: #00ff88;">${stat.delivered || 0}</td>
                                        <td style="padding: 12px; text-align: center; color: #00d9ff;">${stat.read || 0}</td>
                                        <td style="padding: 12px; text-align: center; color: var(--accent-error);">${stat.failed || 0}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    `;
                    } else {
                        container.innerHTML = '<div style="text-align: center; color: var(--text-secondary); padding: 20px;">📊 لا توجد إحصائيات مفصلة - الحملة تستخدم جهاز واحد</div>';
                    }
                } catch (error) {
                    console.error('Error loading device stats:', error);
                    container.innerHTML = '<div style="text-align: center; color: var(--text-secondary); padding: 20px;">تعذر تحميل الإحصائيات</div>';
                }
            }

            function renderActionButtons() {
                // Calculate if campaign is actually completed based on progress
                const completedCount = (campaign.sent_count || 0) + (campaign.failed_count || 0);
                const uniqueSteps = campaign.steps ? [...new Map(campaign.steps.map(s => [s.step_order, s])).values()] : [];
                const stepsCount = uniqueSteps.length || 1;
                const isSequential = campaign.type === 'sequential' && stepsCount > 1;
                const totalMessages = isSequential
                    ? (campaign.total_recipients || 0) * stepsCount
                    : (campaign.total_recipients || 0);
                const percent = totalMessages > 0 ? Math.min(100, Math.round((completedCount / totalMessages) * 100)) : 0;

                // Determine actual status - if 100% complete, treat as completed
                let actualStatus = campaign.status;
                if (percent >= 100 && campaign.status !== 'cancelled' && campaign.status !== 'failed') {
                    actualStatus = 'completed';
                }

                let buttons = '';
                if (actualStatus === 'draft' || actualStatus === 'paused') {
                    buttons += `<button class="btn btn-success" onclick="startCampaign()"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg> تشغيل</button>`;
                }
                if (actualStatus === 'running') {
                    buttons += `<button class="btn btn-warning" onclick="pauseCampaign()"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> إيقاف مؤقت</button>`;
                }
                if (actualStatus !== 'completed' && actualStatus !== 'cancelled') {
                    buttons += `<button class="btn btn-danger" onclick="cancelCampaign()"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" x2="9" y1="9" y2="15"/><line x1="9" x2="15" y1="9" y2="15"/></svg> إلغاء</button>`;
                }
                return buttons;
            }

            function attachActionHandlers() {
                // Action handlers attached via onclick
            }

            async function startCampaign() {
                const response = await fetch(`/api/campaigns/${campaignId}/start`, { method: 'POST' });
                const data = await response.json();
                if (data.success) {
                    showToast('تم تشغيل الحملة', 'success');
                    loadCampaign();
                } else {
                    showToast(data.error, 'error');
                }
            }

            async function pauseCampaign() {
                const response = await fetch(`/api/campaigns/${campaignId}/pause`, { method: 'POST' });
                const data = await response.json();
                if (data.success) {
                    showToast('تم إيقاف الحملة مؤقتاً', 'warning');
                    loadCampaign();
                } else {
                    showToast(data.error, 'error');
                }
            }

            async function cancelCampaign() {
                if (!confirm('هل أنت متأكد من إلغاء الحملة؟')) return;
                const response = await fetch(`/api/campaigns/${campaignId}/cancel`, { method: 'POST' });
                const data = await response.json();
                if (data.success) {
                    showToast('تم إلغاء الحملة', 'error');
                    loadCampaign();
                } else {
                    showToast(data.error, 'error');
                }
            }

            // Socket.IO real-time updates
            socket.on('campaign:progress', (data) => {
                if (data.campaignId == campaignId) {
                    campaign.sent_count = data.sent || campaign.sent_count;
                    campaign.failed_count = data.failed || campaign.failed_count;
                    campaign.status = data.status || campaign.status;
                    renderCampaign();
                    loadEnrollments();

                    if (data.eta) {
                        const etaEl = document.getElementById('etaValue');
                        if (etaEl) {
                            etaEl.textContent = formatETA(data.eta);
                        }
                    }
                }
            });

            socket.on('campaign:status', (data) => {

                    campaign.status = data.status;
                    renderCampaign();
                }
            });

            socket.on('campaign:message_ack', (data) => {
                if (data.campaignId == campaignId) {

                    // Update campaign counts based on status
                    if (data.status === 'delivered') {
                        campaign.delivered_count = (campaign.delivered_count || 0) + 1;

                if (diff <= 0) return 'قريباً';
                const mins = Math.floor(diff / 60000);
                const hours = Math.floor(mins / 60);
                if (hours > 0) return `${hours} ساعة ${mins % 60} دقيقة`;
                return `${mins} دقيقة`;

                    borderColor = 'rgba(239, 68, 68, 0.4)';
                } else {
                    icon = '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#f59e0b" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12" y1="17" y2="17.01"/></svg>';
                    borderColor = 'rgba(245, 158, 11, 0.4)';

                toast.style.cssText = `
                    position: fixed;
                    bottom: 24px;
                    left: 24px;
                    padding: 16px 24px;
                    background: rgba(255, 255, 255, 0.95);
                    border: 1px solid ${borderColor};

                    transform: translateY(100px);
                    opacity: 0;
                    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);

                toast.innerHTML = `${icon} <span>${message}</span>`;

            // Calculate response time between sent and delivered
            function calculateResponseTime(sentAt, deliveredAt) {
                if (!sentAt || !deliveredAt) return '-';
                const sent = new Date(sentAt);
                const delivered = new Date(deliveredAt);
                const diffMs = delivered - sent;

                if (diffMs < 1000) return 'فوري';
                if (diffMs < 60000) return Math.round(diffMs / 1000) + ' ثانية';
                if (diffMs < 3600000) return Math.round(diffMs / 60000) + ' دقيقة';
                return Math.round(diffMs / 3600000) + ' ساعة';
            }

            // Get color for label
            function getLabelColor(label) {
                const colors = ['#00ff88', '#00d9ff', '#ffb300', '#ff6b81', '#a29bfe', '#fd79a8', '#81ecec', '#ffeaa7'];
                let hash = 0;
                for (let i = 0; i < label.length; i++) {
                    hash = label.charCodeAt(i) + ((hash << 5) - hash);
                }
                return colors[Math.abs(hash) % colors.length];
            }

            // ==================== CHAT MODAL ====================
            let currentChatPhone = null;

            async function openChatModal(phone, name, deviceId) {
                currentChatPhone = phone;
                currentChatDeviceId = deviceId;
                currentChatName = name;

                document.getElementById('chatModalName').textContent = name || phone;
                document.getElementById('chatModalPhone').textContent = phone;
                document.getElementById('chatModal').style.display = 'flex';
                document.getElementById('chatMessageInput').value = '';

                await loadChatMessages();
            }

            function closeChatModal() {
                document.getElementById('chatModal').style.display = 'none';
                currentChatPhone = null;
                currentChatDeviceId = null;
            }

            async function loadChatMessages() {
                const container = document.getElementById('chatMessages');
                container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

                try {
                    // Build chat ID format for WhatsApp
                    const chatId = currentChatPhone.includes('@') ? currentChatPhone : `${currentChatPhone}@c.us`;

                    // Try WhatsApp real-time API first (like chats.js) - pass deviceId for correct profile
                    let response = await fetch(`/api/whatsapp/chat/${encodeURIComponent(chatId)}/messages?limit=50&deviceId=${currentChatDeviceId}`);
                    let data = await response.json();

                    // Fallback to database if WhatsApp API fails
                    if (!data.success) {
                        response = await fetch(`/api/messages/chat/${encodeURIComponent(chatId)}?limit=50`);
                        data = await response.json();
                    }

                    if (data.success && data.data && data.data.length > 0) {
                        // Messages come newest first, reverse for display
                        const messages = [...data.data].reverse();
                        container.innerHTML = messages.map(msg => `
                        <div class="message-item ${msg.fromMe || msg.from_me || msg.is_from_me ? 'sent' : 'received'}">
                            <div class="message-content">${renderMessageContent(msg)}</div>
                            <div class="message-time">${formatTime(msg.timestamp || msg.created_at)}</div>
                        </div>
                    `).join('');
                        container.scrollTop = container.scrollHeight;
                    } else {
                        container.innerHTML = '<div style="text-align:center;color:var(--text-secondary);padding:40px;">لا توجد رسائل سابقة</div>';
                    }
                } catch (error) {
                    console.error('Error loading messages:', error);
                    container.innerHTML = '<div style="text-align:center;color:var(--accent-error);padding:40px;">تعذر تحميل الرسائل</div>';
                }
            }

            // Helper to render message content with media support
            function renderMessageContent(msg) {
                const type = msg.type || msg.message_type || 'chat';
                const body = msg.body || msg.content || '';
                const mediaUrl = msg.mediaUrl || msg.media_url || '';
                const hasMedia = msg.hasMedia || false;

                // Text message
                if (type === 'chat' || type === 'text') {
                    return escapeHtml(body) || '';
                }

                // If has media URL, show the actual media
                if (mediaUrl) {
                    // Image
                    if (type === 'image' || type === 'sticker') {
                        return `<img src="${mediaUrl}" alt="صورة" style="max-width:100%;max-height:200px;border-radius:8px;cursor:pointer;" onclick="window.open('${mediaUrl}','_blank')">
                            ${body ? '<div style="margin-top:8px;">' + escapeHtml(body) + '</div>' : ''}`;
                    }
                    // Video
                    if (type === 'video') {
                        return `<video controls style="max-width:100%;max-height:200px;border-radius:8px;">
                                <source src="${mediaUrl}" type="video/mp4">
                            </video>
                            ${body ? '<div style="margin-top:8px;">' + escapeHtml(body) + '</div>' : ''}`;
                    }
                    // Audio/Voice  
                    if (type === 'audio' || type === 'ptt' || type === 'voice') {
                        return `<audio controls style="width:100%;">
                                <source src="${mediaUrl}" type="audio/ogg">
                            </audio>
                            ${body ? '<div style="margin-top:8px;">' + escapeHtml(body) + '</div>' : ''}`;
                    }
                    // Document
                    if (type === 'document') {
                        const filename = msg.filename || 'ملف';
                        return `<a href="${mediaUrl}" target="_blank" style="display:flex;align-items:center;gap:8px;padding:10px;background:rgba(255,255,255,0.1);border-radius:8px;text-decoration:none;color:inherit;">
                                <span style="font-size:24px;">📄</span>
                                <span>${escapeHtml(filename)}</span>
                            </a>
                            ${body ? '<div style="margin-top:8px;">' + escapeHtml(body) + '</div>' : ''}`;
                    }
                }

                // If hasMedia but no URL, show styled placeholder with type icon
                if (hasMedia || ['image', 'sticker', 'video', 'audio', 'ptt', 'voice', 'document'].includes(type)) {
                    const icons = {
                        'image': '🖼️', 'sticker': '🎨', 'video': '🎬', 'audio': '🎵',
                        'ptt': '🎤', 'voice': '🎤', 'document': '📄'
                    };
                    const labels = {
                        'image': 'صورة', 'sticker': 'ملصق', 'video': 'فيديو', 'audio': 'مقطع صوتي',
                        'ptt': 'رسالة صوتية', 'voice': 'رسالة صوتية', 'document': 'مستند'
                    };
                    const icon = icons[type] || '📎';
                    const label = labels[type] || 'ملف مرفق';
                    return `<div style="display:flex;align-items:center;gap:8px;padding:12px;background:rgba(255,255,255,0.05);border-radius:8px;border:1px dashed rgba(255,255,255,0.2);">
                            <span style="font-size:28px;">${icon}</span>
                            <span style="color:var(--text-secondary);">${label}</span>
                        </div>
                        ${body ? '<div style="margin-top:8px;">' + escapeHtml(body) + '</div>' : ''}`;
                }

                // Location
                if (type === 'location') {
                    return `<a href="https://maps.google.com/?q=${msg.latitude},${msg.longitude}" target="_blank" style="color:var(--accent-primary);">📍 موقع</a>`;
                }

                // Default - show body text
                return escapeHtml(body) || '';
            }

            async function sendChatMessage() {

                        method: 'POST',

                            to: currentChatPhone,
                            message: message

                        input.value = '';

                        </div>

                    const response = await fetch(`/api/campaigns/enrollments/${currentLabelsEnrollmentId}/labels`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ label })

                        currentLabels.push(label);

                    const response = await fetch(`/api/campaigns/enrollments/${currentLabelsEnrollmentId}/labels/${encodeURIComponent(label)}`, {

                    const data = await response.json();
                    if (data.success) {

                        showToast('تم حذف التصنيف', 'success');

                        showToast(data.error || 'فشل حذف التصنيف', 'error');

            // Handle Enter key in inputs
            document.addEventListener('DOMContentLoaded', () => {
                document.getElementById('chatMessageInput')?.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        sendChatMessage();
                    }
                });
                document.getElementById('newLabelInput')?.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        submitNewLabel();
                    }
                });
            });

            // Close modals on escape key
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    closeChatModal();
                    closeLabelsModal();
                }
            });

            loadCampaign();
        </script>
</body>

</html>
